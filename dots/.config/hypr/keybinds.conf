$super = SUPER
$alt = ALT

$terminal = kitty
$launcher = wofi --show drun

# --- Apps ---
bind = $super, Return, exec, $terminal
bind = $super, Space, exec, $launcher
bind = $super, B, exec, swaync-client -t
bind = $alt, B, exec, swaync-client -d
bind = $super, E, exec, hyprlock

# macOS-ish close/quit
bind = $super, Q, killactive
bind = $alt, ESCAPE, exit

# Window management
bind = $super, F, fullscreen
bind = $super CTRL, F, fullscreen, 1
bind = $super CTRL, H, pseudo,
bind = $super, W, togglefloating,
bindm = $super, mouse:273, resizemouse
bindm = $super, mouse:272, movewindow

# Focus
bind = $super CTRL, left, movefocus, l
bind = $super CTRL, right, movefocus, r
bind = $super CTRL, up, movefocus, u
bind = $super CTRL, down, movefocus, d

# Move windows
bind = $super CTRL SHIFT, left, movewindow, l
bind = $super CTRL SHIFT, right, movewindow, r
bind = $super CTRL SHIFT, up, movewindow, u
bind = $super CTRL SHIFT, down, movewindow, d

# Workspaces
bind = $super, 1, workspace, 1
bind = $super, 2, workspace, 2
bind = $super, 3, workspace, 3
bind = $super, 4, workspace, 4
bind = $super, 5, workspace, 5
bind = $super, 6, workspace, 6
bind = $super, 7, workspace, 7
bind = $super, 8, workspace, 8
bind = $super, 9, workspace, 9

bind = $alt, 1, movetoworkspace, 1
bind = $alt, 2, movetoworkspace, 2
bind = $alt, 3, movetoworkspace, 3
bind = $alt, 4, movetoworkspace, 4
bind = $alt, 5, movetoworkspace, 5
bind = $alt, 6, movetoworkspace, 6
bind = $alt, 7, movetoworkspace, 7
bind = $alt, 8, movetoworkspace, 8
bind = $alt, 9, movetoworkspace, 9

# Screenshots
bind = , Print, exec, ~/.config/hypr/scripts/screenshot-screen.sh
bind = $super, S, exec, ~/.config/hypr/scripts/screenshot-area.sh
bind = $super, M, exec, ~/.config/hypr/scripts/focus-mode.sh toggle
bind = $super, R, exec, ~/.config/hypr/scripts/reload-waybar-hyprland.sh

# Media keys (if your keyboard has them; harmless otherwise)
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-osd.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-osd.sh down
bindel = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-osd.sh mute
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-osd.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-osd.sh down
bind = , XF86PowerOff, exec, wlogout
