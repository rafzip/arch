# --- NVIDIA / Hybrid notes ---
# Hyprland documents AQ_DRM_DEVICES and AQ_FORCE_LINEAR_BLIT for multi-GPU workarounds. :contentReference[oaicite:3]{index=3}
# Adjust AQ_DRM_DEVICES if you need to force which GPU is “primary”.
# Example values often look like: /dev/dri/card0:/dev/dri/card1 (depends on your system)
# env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = AQ_FORCE_LINEAR_BLIT,0

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1


env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
