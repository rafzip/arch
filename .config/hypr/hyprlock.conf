general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-H:%M")"
    color = rgba(dcdcdcff)
    font_size = 90
    font_family = MesloLGS Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(00000080)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(b4b4b4e6)
    font_size = 20
    font_family = MesloLGS Nerd Font
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(00000066)
}

input-field {
    monitor =
    size = 320, 55
    position = 0, -100
    halign = center
    valign = center

    dots_center = true
    dots_size = 0.33
    dots_spacing = 0.15

    font_color = rgba(dcdcdcff)
    inner_color = rgba(0f0f0f99)
    outer_color = rgba(a3a3a399)
    outline_thickness = 1
    rounding = 10

    check_color = rgba(a3a3a3ff)
    fail_color = rgba(c85050cc)
    capslock_color = rgba(c8a050cc)

    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL_REASON</i>

    fade_on_empty = true
    fade_timeout = 1500

    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(00000066)
}
